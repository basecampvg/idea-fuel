# ==============================================
# Railway Deployment Configuration
# Worker service for BullMQ background job processing
# ==============================================

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd packages/server && npx tsx --env-file=../../.env src/worker.ts"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
