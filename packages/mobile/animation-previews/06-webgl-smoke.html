<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 6: WebGL Volumetric Smoke</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #161513; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  .content {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1;
  }
  .logo {
    width: 80px; height: 80px; margin-bottom: 32px;
    background: radial-gradient(circle at 40% 30%, #E32B1A, #DB4D40);
    clip-path: path('M40 5 C50 25, 70 35, 65 55 C60 70, 50 78, 40 75 C30 78, 20 70, 15 55 C10 35, 30 25, 40 5Z');
    animation: logoIn 0.8s ease-out 0.3s both;
  }
  .tagline {
    font-size: 22px; color: #E8E4DC; text-align: center;
    letter-spacing: -0.5px; margin-bottom: 16px;
    animation: slideUp 0.6s ease-out 0.8s both;
  }
  .typewriter-wrap {
    height: 28px; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.6s ease-out 1.2s both;
  }
  .typewriter { font-size: 16px; color: #8A8680; }
  .cursor { color: #E32B1A; animation: blink 0.8s step-start infinite; }
  @keyframes logoIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="content">
  <div class="logo"></div>
  <div class="tagline">Don't let your ideas die.</div>
  <div class="typewriter-wrap">
    <span class="typewriter" id="tw"></span><span class="cursor">|</span>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

function resize() {
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize(); addEventListener('resize', resize);

const vs = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;
const fs = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;

// Simplex-ish noise
vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}
vec3 permute(vec3 x){return mod289((x*34.+1.)*x);}

float snoise(vec2 v){
  const vec4 C=vec4(.211324865405,.366025403784,-.577350269189,.024390243902);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=x0.x>x0.y?vec2(1,0):vec2(0,1);
  vec4 x12=x0.xyxy+C.xxzz;
  x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0,i1.y,1.))+i.x+vec3(0,i1.x,1.));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m;m=m*m;
  vec3 x=2.*fract(p*C.www)-1.;
  vec3 h=abs(x)-.5;
  vec3 a0=x-floor(x+.5);
  m*=1.79284291400159-.85373472095314*(a0*a0+h*h);
  vec3 g;
  g.x=a0.x*x0.x+h.x*x0.y;
  g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}

float fbm(vec2 p){
  float f=0.,a=.5;
  for(int i=0;i<5;i++){f+=a*snoise(p);p*=2.1;a*=.48;}
  return f;
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float t=u_time*.15;

  // Warped smoke
  vec2 q=vec2(fbm(uv*2.+t*.3),fbm(uv*2.+vec2(1.7,9.2)+t*.2));
  vec2 r=vec2(fbm(uv*2.+4.*q+vec2(1.7,9.2)+t*.1),fbm(uv*2.+4.*q+vec2(8.3,2.8)+t*.15));
  float f=fbm(uv*2.+3.*r);

  // Color mapping — dark with brand red/orange highlights
  vec3 bg=vec3(.086,.082,.075); // #161513
  vec3 brandRed=vec3(.89,.17,.1);
  vec3 brandOrange=vec3(.86,.3,.25);
  vec3 warmGlow=vec3(.15,.06,.03);

  vec3 col=bg;
  col=mix(col,warmGlow,clamp(f*.6,0.,.1));
  col=mix(col,brandOrange*0.15,clamp(length(q)*.3,0.,.08));
  col=mix(col,brandRed*0.12,clamp(r.x*.5,0.,.06));

  // Vignette
  float vig=1.-smoothstep(.3,.9,length(uv-.5)*1.2);
  col*=.7+vig*.3;

  gl_FragColor=vec4(col,1);
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_res');

function draw(t) {
  gl.uniform1f(uTime, t * 0.001);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// Typewriter
const phrases = ['validate your ideas in seconds','capture ideas with your voice','deep market research, instantly','find your unfair advantage','turn hunches into business plans'];
let pi=0,ci=0,deleting=false;
const tw=document.getElementById('tw');
function tick(){
  const phrase=phrases[pi];
  if(!deleting){ci++;tw.textContent=phrase.slice(0,ci);if(ci===phrase.length){deleting=true;setTimeout(tick,2200);return;}setTimeout(tick,45);}
  else{ci--;tw.textContent=phrase.slice(0,ci);if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(tick,400);return;}setTimeout(tick,25);}
}
setTimeout(tick,1800);
</script>
</body>
</html>
