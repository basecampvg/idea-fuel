<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 5: Ember Particles (Brand-themed)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #161513; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  .content {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1;
  }
  .logo {
    width: 80px; height: 80px; margin-bottom: 32px;
    background: radial-gradient(circle at 40% 30%, #E32B1A, #DB4D40);
    clip-path: path('M40 5 C50 25, 70 35, 65 55 C60 70, 50 78, 40 75 C30 78, 20 70, 15 55 C10 35, 30 25, 40 5Z');
    animation: logoIn 0.8s ease-out 0.3s both;
  }
  .tagline {
    font-size: 22px; color: #E8E4DC; text-align: center;
    letter-spacing: -0.5px; margin-bottom: 16px;
    animation: slideUp 0.6s ease-out 0.8s both;
  }
  .typewriter-wrap {
    height: 28px; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.6s ease-out 1.2s both;
  }
  .typewriter { font-size: 16px; color: #8A8680; }
  .cursor { color: #E32B1A; animation: blink 0.8s step-start infinite; }
  @keyframes logoIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="content">
  <div class="logo"></div>
  <div class="tagline">Don't let your ideas die.</div>
  <div class="typewriter-wrap">
    <span class="typewriter" id="tw"></span><span class="cursor">|</span>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

// Ember particles — float upward like sparks from a fire
class Ember {
  constructor() { this.reset(); this.y = Math.random() * H; }
  reset() {
    this.x = W * 0.3 + Math.random() * W * 0.4;
    this.y = H + Math.random() * 20;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -(Math.random() * 0.8 + 0.3);
    this.size = Math.random() * 3 + 1;
    this.life = 1;
    this.decay = Math.random() * 0.002 + 0.001;
    this.wobbleSpeed = Math.random() * 0.02 + 0.01;
    this.wobbleAmp = Math.random() * 30 + 10;
    this.phase = Math.random() * Math.PI * 2;
    // Color: mix of brand red, orange, and warm yellow
    const mix = Math.random();
    if (mix < 0.4) { this.r = 227; this.g = 43; this.b = 26; }      // brand red
    else if (mix < 0.7) { this.r = 255; this.g = 120; this.b = 30; } // orange
    else { this.r = 255; this.g = 180; this.b = 50; }                 // warm yellow
  }
  update(t) {
    this.x += this.vx + Math.sin(t * this.wobbleSpeed + this.phase) * 0.3;
    this.y += this.vy;
    this.life -= this.decay;
    if (this.life <= 0 || this.y < -20) this.reset();
  }
  draw(ctx) {
    const a = this.life * 0.6;
    // Glow
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
    g.addColorStop(0, `rgba(${this.r},${this.g},${this.b},${a * 0.3})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(this.x - this.size * 4, this.y - this.size * 4, this.size * 8, this.size * 8);
    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${a})`;
    ctx.fill();
  }
}

const embers = Array.from({length: 60}, () => new Ember());

// Ambient base glow
function drawBaseGlow(t) {
  const pulse = 0.06 + Math.sin(t * 0.0004) * 0.02;
  const g = ctx.createRadialGradient(W * 0.5, H * 0.85, 0, W * 0.5, H * 0.6, H * 0.5);
  g.addColorStop(0, `rgba(227, 43, 26, ${pulse})`);
  g.addColorStop(0.5, `rgba(219, 77, 64, ${pulse * 0.3})`);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function draw(t) {
  ctx.fillStyle = '#161513';
  ctx.fillRect(0, 0, W, H);
  drawBaseGlow(t);
  embers.forEach(e => { e.update(t); e.draw(ctx); });
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// Typewriter
const phrases = ['validate your ideas in seconds','capture ideas with your voice','deep market research, instantly','find your unfair advantage','turn hunches into business plans'];
let pi=0,ci=0,deleting=false;
const tw=document.getElementById('tw');
function tick(){
  const phrase=phrases[pi];
  if(!deleting){ci++;tw.textContent=phrase.slice(0,ci);if(ci===phrase.length){deleting=true;setTimeout(tick,2200);return;}setTimeout(tick,45);}
  else{ci--;tw.textContent=phrase.slice(0,ci);if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(tick,400);return;}setTimeout(tick,25);}
}
setTimeout(tick,1800);
</script>
</body>
</html>
